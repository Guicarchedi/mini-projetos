<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora Simples</title>
</head>
<body>
    <div class="container">
        <div class="display-input">
            <input type="number" name="numero1" id="numero1">
            <input type="number" name="numero2" id="numero2"> <span>=</span>
            <div class="display">
                <p id="displayConteudo"></p>
            </div>
        </div>
        <div class="botoes">
            <button id="somar">Somar</button>
            <button id="subtrair">Subtrair</button>
            <button id="multiplicar">Multiplicar</button>
            <button id="dividir">Dividir</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
