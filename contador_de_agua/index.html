<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Água</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cabeçalho">
        <h1>Bebeu Água Hoje?</h1>
    </div>
    <div class="container">
        <div class="contagem">
            <p id="textoContagem">Você bebeu: 0 copos de água</p> <br>
            <p id="mensagemContador"></p>
        </div>
        <div class="container-copos">
            <img src="imagens/copo10cheio400.png" alt="Imagem copo de água 10% cheio" id="copo10" class="copo ativo">
            <img src="imagens/copo20cheio400.png" alt="Imagem copo de água 20% cheio" id="copo20" class="copo">
            <img src="imagens/copo30cheio400.png" alt="Imagem copo de água 30% cheio" id="copo30" class="copo">
            <img src="imagens/copo40cheio400.png" alt="Imagem copo de água 40% cheio" id="copo40" class="copo">
            <img src="imagens/copo50cheio400.png" alt="Imagem copo de água 50% cheio" id="copo50" class="copo">
            <img src="imagens/copo60cheio400.png" alt="Imagem copo de água 60% cheio" id="copo60" class="copo">
            <img src="imagens/copo70cheio400.png" alt="Imagem copo de água 70% cheio" id="copo70" class="copo">
        </div>
        <div class="area-botoes">
            <button id="bebiAgua">Bebi Água</button>
            <button id="resetar">Resetar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
