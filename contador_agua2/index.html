<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Contador de Água</title>
</head>
<body>
    <div class="container">
        <div class="cabecalho">
            <h1>Contador de Água2.0</h1>
        </div>
        <div class="corpo">
            <div class="contador">
                <p id="display-contador">Você bebeu: 0 copos de água</p>
            </div>
            <div class="barra-progresso">
                <div class="barra">
                    <div id="displayBarra"></div>
                </div>
                <div class="progresso">
                    <p id="display-progresso">Progresso: 0ml de água</p>
                </div>
            </div>
            <div class="botoes">
                <button id="adicionar">Bebi Água</button>
                <button id="resetar">Resetar</button>
            </div>
        </div>
    </div>
</body>
</html>
